[general]
framerate = 60
bars = 0
bar_width = 2
bar_spacing = 1
lower_cutoff_freq = 50
higher_cutoff_freq = 10000

[input]
method = pulse
source = auto

[output]
method = ncurses
channels = stereo
mono_option = average
raw_target = /dev/stdout
data_format = binary
bit_format = 16bit
ascii_max_range = 1000
bar_delimiter = 59

[color]
# Sunset Drive - Synthwave theme
gradient = 1
gradient_count = 8

# Gradient from cyan -> blue -> magenta -> pink -> red/orange
gradient_color_1 = '#3CFFED'  # Cyan (color6)
gradient_color_2 = '#33A1FF'  # Bright Blue (accent/color4)
gradient_color_3 = '#5a9eff'  # Light Blue (color12)
gradient_color_4 = '#FF66F6'  # Magenta (color5)
gradient_color_5 = '#ff99ff'  # Light Magenta (color13)
gradient_color_6 = '#ff9a8f'  # Coral/Pink (color9)
gradient_color_7 = '#FF3366'  # Hot Pink/Red (color1)
gradient_color_8 = '#FFEA00'  # Yellow accent (color3)

[smoothing]
monstercat = 1
waves = 0
gravity = 100
ignore = 0

[eq]
1 = 1
2 = 1
3 = 1
4 = 1
5 = 1
